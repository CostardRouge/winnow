  <g transform="translate(128 128) scale(10.667)" fill="none" stroke="#f4f0e7" stroke-linecap="round">
    <path d="M4 20c8.5-1 14-6.5 16-16" stroke-width="2.1"/>
    <path d="M5.5 18.5c5.5-.4 9.8-4.2 11.7-10.6M7.5 16.8c3.6-.3 6.6-2.9 8.2-7.3" stroke-width="1.7" opacity="0.55"/>
    <circle cx="4" cy="20" r="1.7" fill="#f4f0e7" stroke="none"/>
  </g>
</svg>
