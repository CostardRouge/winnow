<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Winnow">
  <!-- Maskable variant: vermillion bleeds to the edges so platform masks (circle,
       squircle, rounded-rect) never clip the mark. Art stays inside the safe zone. -->
