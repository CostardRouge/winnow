name: Build & Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      # Optional: point this at the Watchtower HTTP API on the Optiplex/NAS to
      # trigger an instant redeploy after each push. Leave the secrets unset and
      # the build still publishes — only the redeploy step is skipped.
      #   DEPLOY_WEBHOOK_URL   e.g. https://watchtower.example.com/v1/update?image=ghcr.io/costardrouge/winnow
      #   DEPLOY_WEBHOOK_TOKEN matches WATCHTOWER_HTTP_API_TOKEN on the host
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
      DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name (CostardRouge -> costardrouge).
          images: ghcr.io/${{ github.repository }}
          # `main` + `latest` are moving tags (what Watchtower re-pulls);
          # `sha-<short>` is immutable and what you pin to for a rollback.
          tags: |
            type=raw,value=main
            type=raw,value=latest
            type=sha,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry-side layer cache keyed on the workflow run, so unchanged
          # layers (base image, npm deps) aren't rebuilt every push.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger redeploy (Watchtower HTTP API)
        if: env.DEPLOY_WEBHOOK_URL != ''
        run: |
          echo "Triggering Watchtower update…"
          curl -fsS --retry 3 --retry-delay 5 -X POST \
            -H "Authorization: Bearer ${DEPLOY_WEBHOOK_TOKEN}" \
            "${DEPLOY_WEBHOOK_URL}"
