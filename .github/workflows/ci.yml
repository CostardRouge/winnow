name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"

# Cancel an in-progress run when a new commit lands on the same PR. On `main`,
# head_ref is empty -> fallback to run_id (unique) -> main runs are never
# cancelled, so every commit pushed to main is validated end-to-end.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Static checks — no services needed, so this fails fast on type errors.
  # (winnow has no ESLint config; `tsc --noEmit` is its static gate.)
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          # Matches the runtime image (node:22-slim) so CI validates what ships.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  # Build + migrations against a real Postgres (the SQL is part of the contract).
  build:
    name: Build & migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector superset of postgres:16 — the CLIP-search migration (0025)
        # does CREATE EXTENSION vector, so the plain image would fail `migrate`.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: winnow
          POSTGRES_PASSWORD: winnow
          POSTGRES_DB: winnow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U winnow -d winnow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://winnow:winnow@localhost:5432/winnow
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations (validates SQL)
        run: npm run migrate

      - name: Production build
        run: npm run build
