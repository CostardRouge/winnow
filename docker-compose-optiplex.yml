# Winnow — Optiplex deployment via Portainer (Traefik + external edge network).
#
# Modeled on the motion-pipeline stack: Traefik as frontend (external `edge`
# network), internal services on a private network, host-path volumes under
# /opt/winnow, Watchtower labels. The image is published to GHCR by CI
# (.github/workflows/docker-build.yml); Watchtower re-pulls it on the `main` tag.
#
# Host-side prerequisites (Ubuntu):
#   - Docker network `edge` already created and attached to Traefik:  docker network create edge
#   - NFS client package:  sudo apt-get install -y nfs-common
#   - Synology NAS: allow the Optiplex IP in the NFS rules of both shared
#     folders `Data` (/volume1/Data, RO) and `Computing`
#     (/volume4/Computing, RW). The mount is handled by the stack (volumes
#     `nas` / `nas_incoming` below), not by fstab.
#   - state directories:  sudo mkdir -p /opt/winnow/{pgdata,redisdata,inbox,derivatives,exports}
#   - dedicated SSD (optional): to put inbox/derivatives/exports on another
#     disk (e.g. 2 TB SSD), set WINNOW_DATA in the Portainer UI (e.g.
#     WINNOW_DATA=/mnt/2tb/winnow) and create the folder:
#       sudo mkdir -p /mnt/2tb/winnow/{inbox,derivatives,exports}
#     (pgdata/redisdata stay under /opt/winnow; moving them = same principle.)
#
# Portainer deployment: Stacks → Add stack → Repository → this file.
# In the stack's "Environment variables" UI, provide: DOMAIN_NAME
# (required, Traefik), NAS_IP (required, NFS) and any setting to override
# (POSTGRES_PASSWORD, WINNOW_DATA, NAS_*_EXPORT, *_HOST_PORT, concurrencies…).
# No .env file is required: the containers' runtime variables are inlined via
# the `x-winnow-env` anchor.

# Environment variables for the app/worker/migrate containers. Inlined here (and
# not via `env_file: .env`) so Portainer deploys from the repo without a .env
# file existing on the host. Topology values (service names, volume paths) are
# fixed; secrets and overridable settings go through the Portainer UI
# (${VAR:-default} interpolation).
x-winnow-env: &winnow-env
  DATABASE_URL: postgres://winnow:${POSTGRES_PASSWORD:-winnow}@postgres:5432/winnow
  REDIS_URL: redis://redis:6379
  STORAGE_DRIVER: ${STORAGE_DRIVER:-disk}
  STORAGE_DISK_PATH: /data/derivatives
  EXPORT_DIR: /data/exports
  INBOX_DIR: /data/inbox
  INCOMING_DIR: /nas-incoming
  WATCH_INBOX: "true"
  IMPORT_CONCURRENCY: "${IMPORT_CONCURRENCY:-1}"
  SCAN_CONCURRENCY: "${SCAN_CONCURRENCY:-1}"
  DERIVATIVE_CONCURRENCY: "${DERIVATIVE_CONCURRENCY:-3}"
  EXPORT_CONCURRENCY: "${EXPORT_CONCURRENCY:-2}"
  THUMB_SIZE: "${THUMB_SIZE:-400}"
  PROXY_SIZE: "${PROXY_SIZE:-2048}"
  THUMB_QUALITY: "${THUMB_QUALITY:-70}"
  PROXY_QUALITY: "${PROXY_QUALITY:-80}"
  # Video derivatives (ffmpeg). hwaccel=none → software libx264 encoding (works
  # everywhere). Set VIDEO_HWACCEL=vaapi ONCE /dev/dri is shared with the worker
  # and verified (`docker exec winnow_worker vainfo`). Auto software fallback on failure.
  VIDEO_HWACCEL: ${VIDEO_HWACCEL:-none}
  VIDEO_VAAPI_DEVICE: ${VIDEO_VAAPI_DEVICE:-/dev/dri/renderD128}
  VIDEO_PROXY_HEIGHT: "${VIDEO_PROXY_HEIGHT:-720}"
  VIDEO_PROXY_CRF: "${VIDEO_PROXY_CRF:-24}"
  # S3 / MinIO — used only if STORAGE_DRIVER=s3.
  S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_BUCKET: ${S3_BUCKET:-winnow}
  S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  S3_FORCE_PATH_STYLE: "true"

services:
  postgres:
    image: postgres:16-alpine
    container_name: winnow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: winnow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-winnow}
      POSTGRES_DB: winnow
    volumes:
      - /opt/winnow/pgdata:/var/lib/postgresql/data
    networks:
      winnow:
    # Optional host publication (external access / debug). The CONTAINER port
    # stays 5432; only the HOST port is offset so it doesn't clash with another
    # stack (motion-pipeline). app/worker go through the internal network,
    # unaffected. Set POSTGRES_HOST_PORT="" to publish nothing.
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U winnow -d winnow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: winnow_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - /opt/winnow/redisdata:/data
    networks:
      winnow:
    # Same as postgres: host port offset (6380), container stays 6379.
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: applies the migrations then exits. app/worker wait for it.
  migrate:
    image: ghcr.io/costardrouge/winnow:main
    container_name: winnow_migrate
    command: ["npm", "run", "migrate"]
    environment: *winnow-env
    init: true
    restart: "no"
    networks:
      winnow:
    depends_on:
      postgres:
        condition: service_healthy

  app:
    image: ghcr.io/costardrouge/winnow:main
    container_name: winnow_app
    command: ["npm", "run", "start"]
    environment: *winnow-env
    init: true
    restart: unless-stopped
    networks:
      edge:
      winnow:
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Synology NAS: mount the root of the exported share, then expose to the
      # container only the useful subtree (subpath). /nas = library only
      # (RO), /nas-incoming = landing zone only (RW).
      - type: volume
        source: nas
        target: /nas
        read_only: true
        volume:
          subpath: ${NAS_LIBRARY_SUBPATH:-Media/Photos/Photography}
      - type: volume
        source: nas_incoming
        target: /nas-incoming
        volume:
          subpath: ${NAS_INCOMING_SUBPATH:-captures}
      - ${WINNOW_DATA:-/opt/winnow}/inbox:/data/inbox
      - ${WINNOW_DATA:-/opt/winnow}/derivatives:/data/derivatives
      - ${WINNOW_DATA:-/opt/winnow}/exports:/data/exports
    labels:
      - traefik.enable=true
      - traefik.http.routers.winnow.rule=Host(`${DOMAIN_NAME}`)
      - traefik.http.services.winnow.loadbalancer.server.port=3000
      # - traefik.http.routers.winnow.middlewares=basic-auth
      - com.centurylinklabs.watchtower.enable=true

  worker:
    image: ghcr.io/costardrouge/winnow:main
    container_name: winnow_worker
    command: ["npm", "run", "worker"]
    environment: *winnow-env
    init: true
    restart: unless-stopped
    # Shares the Intel iGPU for hardware video encoding (VAAPI). The worker
    # runs as root → access to device nodes without group_add. If the host has
    # no /dev/dri (no iGPU), REMOVE this block and keep VIDEO_HWACCEL=none.
    devices:
      - /dev/dri:/dev/dri
    networks:
      winnow:
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - type: volume
        source: nas
        target: /nas
        read_only: true
        volume:
          subpath: ${NAS_LIBRARY_SUBPATH:-Media/Photos/Photography}
      - type: volume
        source: nas_incoming
        target: /nas-incoming
        volume:
          subpath: ${NAS_INCOMING_SUBPATH:-captures}
      - ${WINNOW_DATA:-/opt/winnow}/inbox:/data/inbox
      - ${WINNOW_DATA:-/opt/winnow}/derivatives:/data/derivatives
      - ${WINNOW_DATA:-/opt/winnow}/exports:/data/exports
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # --- Optional S3 storage (MinIO) ------------------------------------------
  # Uncomment + set STORAGE_DRIVER=s3 in .env to switch disk → S3.
  # HOST ports offset (9100/9101) to coexist with another MinIO stack
  # (motion-pipeline = 9000/9001); CONTAINER ports stay 9000/9001.
  # minio:
  #   image: minio/minio
  #   container_name: winnow_minio
  #   restart: unless-stopped
  #   command: server /data --console-address ":9001"
  #   environment:
  #     MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
  #     MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
  #   volumes:
  #     - /opt/winnow/miniodata:/data
  #   networks:
  #     winnow:
  #     edge:
  #   ports:
  #     - "${MINIO_HOST_PORT:-9100}:9000"
  #     - "${MINIO_CONSOLE_HOST_PORT:-9101}:9001"
  #   labels:
  #     - traefik.enable=true
  #     - traefik.http.routers.winnow-minio-api.rule=Host(`minio-${DOMAIN_NAME}`)
  #     - traefik.http.routers.winnow-minio-api.service=winnow-minio-api
  #     - traefik.http.services.winnow-minio-api.loadbalancer.server.port=9000
  #     - traefik.http.routers.winnow-minio-console.rule=Host(`minio-console-${DOMAIN_NAME}`)
  #     - traefik.http.routers.winnow-minio-console.service=winnow-minio-console
  #     - traefik.http.services.winnow-minio-console.loadbalancer.server.port=9001

  # --- Optional ingest feeders (write into the inbox) -----------------------
  # SMB share: drop cards/files from any machine on the LAN.
  # samba:
  #   image: dperson/samba
  #   container_name: winnow_samba
  #   restart: unless-stopped
  #   command: -s "winnow-inbox;/inbox;yes;no;no;all" -u "shooter;changeme"
  #   ports: ["445:445"]
  #   networks:
  #     winnow:
  #   volumes:
  #     - /opt/winnow/inbox:/inbox
  #
  # FTP: target for the Sony A7C II's FTP transfer (writes into the inbox).
  # ftp:
  #   image: garethflowers/ftp-server
  #   container_name: winnow_ftp
  #   restart: unless-stopped
  #   environment:
  #     FTP_USER: shooter
  #     FTP_PASS: changeme
  #   ports: ["21:21", "40000-40009:40000-40009"]
  #   networks:
  #     winnow:
  #   volumes:
  #     - /opt/winnow/inbox:/home/shooter

# --- Synology NAS NFS volumes ---------------------------------------------
# Mounted by the `local` driver (NFS mount on the host kernel side). We mount the
# ROOT of the exported share (Synology NFS only exports the root of the shared
# folder, not subfolders); the `subpath` on the service side only reveals the
# useful tree. Provide NAS_IP in the Portainer UI; exports/subpaths have
# overridable defaults (NAS_LIBRARY_EXPORT / NAS_INCOMING_EXPORT / *_SUBPATH).
#   - nas          : share `Data`     (/volume1/Data)     → subpath Media/Photos/Photography (RO)
#   - nas_incoming : share `Computing`(/volume4/Computing)→ subpath captures (RW)
# Synology prerequisites: Control Panel → Shared Folder → Data AND
# Computing → NFS Permissions → rule for the Optiplex IP, Security = sys
# (AUTH_SYS), Squash = "No mapping" (or map to a user that can write
# into captures). `subpath` requires Docker Engine ≥ 26 (otherwise, see the
# fallback note at the bottom). Kerberos note: see bottom of file.
volumes:
  nas:
    driver: local
    driver_opts:
      type: nfs
      # ro + soft: a NAS hiccup doesn't freeze the scanner (per-file resilience).
      o: "addr=${NAS_IP},nfsvers=4.1,ro,soft,timeo=30,retrans=2"
      device: ":${NAS_LIBRARY_EXPORT:-/volume1/Data}"
  nas_incoming:
    driver: local
    driver_opts:
      type: nfs
      # rw + hard: we NEVER want to silently lose an import write.
      o: "addr=${NAS_IP},nfsvers=4.1,rw,hard,timeo=600,retrans=2"
      device: ":${NAS_INCOMING_EXPORT:-/volume4/Computing}"

networks:
  # Private network internal to the Winnow services.
  winnow:
  # Network shared with Traefik (created outside the stack: `docker network create edge`).
  edge:
    external: true

# --- GHCR image + Watchtower ----------------------------------------------
# app/worker/migrate run on ghcr.io/costardrouge/winnow:main, published on
# every push to `main` (.github/workflows/docker-build.yml). Watchtower, via the
# com.centurylinklabs.watchtower.enable=true label, re-pulls the image when the
# `main` tag moves and redeploys. To pin a version (rollback), pin an immutable
# `sha-xxxxxxx` tag instead of `main`.
# Local build: to test without GHCR, replace `image:` with `build: .` in the
# three services (and then deploy from a local copy of the repo).
#
# --- Fallback if Docker Engine < 26 (no `subpath`) ------------------------
# If the deployment rejects the `subpath` option, mount the root of the share and
# point the app to the subtree via the env (add in x-winnow-env / Portainer
# INCOMING_DIR=/nas-incoming/captures), then in app+worker replace the
# `type: volume … subpath:` blocks with the short forms:
#     - nas:/nas:ro                 # /nas = the whole Data share (RO) → scan /nas/Media/Photos/Photography
#     - nas_incoming:/nas-incoming  # INCOMING_DIR must point to .../captures
#
# --- Kerberos NFS (optional, not recommended on a trusted LAN) -------------
# The NAS also exposes Kerberos NFS. On a private network, AUTH_SYS + an IP rule
# is enough and stays MUCH simpler: the NFS mount happens in the host kernel
# (`local` driver), so Kerberos would require active rpc.gssd on the HOST, a
# /etc/krb5.conf pointing to the KDC, and a machine keytab joined to the domain — heavy
# for zero gain here. If you insist, add `sec=krb5` (or krb5i/krb5p) in the
# volumes' `o:` and provision gssd+keytab on the Optiplex.