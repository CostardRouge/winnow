# Winnow — déploiement Optiplex via Portainer (Traefik + réseau edge externe).
#
# Calqué sur la stack motion-pipeline : Traefik en frontal (réseau `edge`
# externe), services internes sur un réseau privé, volumes en host-path sous
# /opt/winnow, labels Watchtower. L'image est publiée sur GHCR par la CI
# (.github/workflows/docker-build.yml) ; Watchtower la re-pull au tag `main`.
#
# Pré-requis côté hôte (Ubuntu) :
#   - réseau Docker `edge` déjà créé et attaché à Traefik :  docker network create edge
#   - paquet NFS client :  sudo apt-get install -y nfs-common
#   - NAS Synology : autoriser l'IP de l'Optiplex sur les règles NFS des deux
#     dossiers partagés `Data` (/volume1/Data, RO) et `Computing`
#     (/volume4/Computing, RW). Le montage est géré par la stack (volumes
#     `nas` / `nas_incoming` en bas), pas par fstab.
#   - répertoires d'état :  sudo mkdir -p /opt/winnow/{pgdata,redisdata,inbox,derivatives,exports}
#   - SSD dédié (optionnel) : pour mettre inbox/derivatives/exports sur un autre
#     disque (ex. SSD 2 To), définir WINNOW_DATA dans l'UI Portainer (ex.
#     WINNOW_DATA=/mnt/2tb/winnow) et créer le dossier :
#       sudo mkdir -p /mnt/2tb/winnow/{inbox,derivatives,exports}
#     (pgdata/redisdata restent sous /opt/winnow ; les déplacer = même principe.)
#
# Déploiement Portainer : Stacks → Add stack → Repository → ce fichier.
# Renseigner dans l'UI « Environment variables » de la stack : DOMAIN_NAME
# (obligatoire, Traefik), NAS_IP (obligatoire, NFS) et tout réglage à surcharger
# (POSTGRES_PASSWORD, WINNOW_DATA, NAS_*_EXPORT, *_HOST_PORT, concurrences…).
# Aucun fichier .env n'est requis : les variables runtime des conteneurs sont
# inlinées via l'ancre `x-winnow-env`.

# Variables d'environnement des conteneurs app/worker/migrate. Inlinées ici (et
# non via `env_file: .env`) pour que Portainer déploie depuis le dépôt sans qu'un
# fichier .env existe sur l'hôte. Les valeurs de topologie (noms de services,
# chemins de volumes) sont figées ; secrets et réglages surchargeables passent
# par l'UI Portainer (interpolation ${VAR:-défaut}).
x-winnow-env: &winnow-env
  DATABASE_URL: postgres://winnow:${POSTGRES_PASSWORD:-winnow}@postgres:5432/winnow
  REDIS_URL: redis://redis:6379
  STORAGE_DRIVER: ${STORAGE_DRIVER:-disk}
  STORAGE_DISK_PATH: /data/derivatives
  EXPORT_DIR: /data/exports
  INBOX_DIR: /data/inbox
  INCOMING_DIR: /nas-incoming
  WATCH_INBOX: "true"
  IMPORT_CONCURRENCY: "${IMPORT_CONCURRENCY:-1}"
  SCAN_CONCURRENCY: "${SCAN_CONCURRENCY:-1}"
  DERIVATIVE_CONCURRENCY: "${DERIVATIVE_CONCURRENCY:-3}"
  EXPORT_CONCURRENCY: "${EXPORT_CONCURRENCY:-2}"
  THUMB_SIZE: "${THUMB_SIZE:-400}"
  PROXY_SIZE: "${PROXY_SIZE:-2048}"
  THUMB_QUALITY: "${THUMB_QUALITY:-70}"
  PROXY_QUALITY: "${PROXY_QUALITY:-80}"
  # S3 / MinIO — utilisé seulement si STORAGE_DRIVER=s3.
  S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_BUCKET: ${S3_BUCKET:-winnow}
  S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  S3_FORCE_PATH_STYLE: "true"

services:
  postgres:
    image: postgres:16-alpine
    container_name: winnow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: winnow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-winnow}
      POSTGRES_DB: winnow
    volumes:
      - /opt/winnow/pgdata:/var/lib/postgresql/data
    networks:
      winnow:
    # Publication hôte optionnelle (accès externe / debug). Le port CONTENEUR
    # reste 5432 ; seul le port HÔTE est décalé pour ne pas heurter une autre
    # stack (motion-pipeline). app/worker passent par le réseau interne, non
    # affectés. Mettre POSTGRES_HOST_PORT="" pour ne rien publier.
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U winnow -d winnow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: winnow_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - /opt/winnow/redisdata:/data
    networks:
      winnow:
    # Idem postgres : port hôte décalé (6380), conteneur reste 6379.
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot : applique les migrations puis sort. app/worker l'attendent.
  migrate:
    image: ghcr.io/costardrouge/winnow:main
    container_name: winnow_migrate
    command: ["npm", "run", "migrate"]
    environment: *winnow-env
    init: true
    restart: "no"
    networks:
      winnow:
    depends_on:
      postgres:
        condition: service_healthy

  app:
    image: ghcr.io/costardrouge/winnow:main
    container_name: winnow_app
    command: ["npm", "run", "start"]
    environment: *winnow-env
    init: true
    restart: unless-stopped
    networks:
      edge:
      winnow:
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # NAS Synology : on monte la racine du partage exporté puis on n'expose au
      # conteneur que la sous-arbo utile (subpath). /nas = uniquement la
      # bibliothèque (RO), /nas-incoming = uniquement la zone d'arrivée (RW).
      - type: volume
        source: nas
        target: /nas
        read_only: true
        volume:
          subpath: ${NAS_LIBRARY_SUBPATH:-Media/Photos/Photography}
      - type: volume
        source: nas_incoming
        target: /nas-incoming
        volume:
          subpath: ${NAS_INCOMING_SUBPATH:-captures}
      - ${WINNOW_DATA:-/opt/winnow}/inbox:/data/inbox
      - ${WINNOW_DATA:-/opt/winnow}/derivatives:/data/derivatives
      - ${WINNOW_DATA:-/opt/winnow}/exports:/data/exports
    labels:
      - traefik.enable=true
      - traefik.http.routers.winnow.rule=Host(`${DOMAIN_NAME}`)
      - traefik.http.services.winnow.loadbalancer.server.port=3000
      # - traefik.http.routers.winnow.middlewares=basic-auth
      - com.centurylinklabs.watchtower.enable=true

  worker:
    image: ghcr.io/costardrouge/winnow:main
    container_name: winnow_worker
    command: ["npm", "run", "worker"]
    environment: *winnow-env
    init: true
    restart: unless-stopped
    networks:
      winnow:
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - type: volume
        source: nas
        target: /nas
        read_only: true
        volume:
          subpath: ${NAS_LIBRARY_SUBPATH:-Media/Photos/Photography}
      - type: volume
        source: nas_incoming
        target: /nas-incoming
        volume:
          subpath: ${NAS_INCOMING_SUBPATH:-captures}
      - ${WINNOW_DATA:-/opt/winnow}/inbox:/data/inbox
      - ${WINNOW_DATA:-/opt/winnow}/derivatives:/data/derivatives
      - ${WINNOW_DATA:-/opt/winnow}/exports:/data/exports
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # --- Stockage S3 optionnel (MinIO) ----------------------------------------
  # Décommente + passe STORAGE_DRIVER=s3 dans .env pour basculer disque → S3.
  # Ports HÔTE décalés (9100/9101) pour cohabiter avec une autre stack MinIO
  # (motion-pipeline = 9000/9001) ; ports CONTENEUR restent 9000/9001.
  # minio:
  #   image: minio/minio
  #   container_name: winnow_minio
  #   restart: unless-stopped
  #   command: server /data --console-address ":9001"
  #   environment:
  #     MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
  #     MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
  #   volumes:
  #     - /opt/winnow/miniodata:/data
  #   networks:
  #     winnow:
  #     edge:
  #   ports:
  #     - "${MINIO_HOST_PORT:-9100}:9000"
  #     - "${MINIO_CONSOLE_HOST_PORT:-9101}:9001"
  #   labels:
  #     - traefik.enable=true
  #     - traefik.http.routers.winnow-minio-api.rule=Host(`minio-${DOMAIN_NAME}`)
  #     - traefik.http.routers.winnow-minio-api.service=winnow-minio-api
  #     - traefik.http.services.winnow-minio-api.loadbalancer.server.port=9000
  #     - traefik.http.routers.winnow-minio-console.rule=Host(`minio-console-${DOMAIN_NAME}`)
  #     - traefik.http.routers.winnow-minio-console.service=winnow-minio-console
  #     - traefik.http.services.winnow-minio-console.loadbalancer.server.port=9001

  # --- Feeders d'ingest optionnels (écrivent dans l'inbox) ------------------
  # Partage SMB : déposer cartes/fichiers depuis n'importe quel poste du LAN.
  # samba:
  #   image: dperson/samba
  #   container_name: winnow_samba
  #   restart: unless-stopped
  #   command: -s "winnow-inbox;/inbox;yes;no;no;all" -u "shooter;changeme"
  #   ports: ["445:445"]
  #   networks:
  #     winnow:
  #   volumes:
  #     - /opt/winnow/inbox:/inbox
  #
  # FTP : cible pour le transfert FTP du Sony A7C II (écrit dans l'inbox).
  # ftp:
  #   image: garethflowers/ftp-server
  #   container_name: winnow_ftp
  #   restart: unless-stopped
  #   environment:
  #     FTP_USER: shooter
  #     FTP_PASS: changeme
  #   ports: ["21:21", "40000-40009:40000-40009"]
  #   networks:
  #     winnow:
  #   volumes:
  #     - /opt/winnow/inbox:/home/shooter

# --- Volumes NFS du NAS Synology ------------------------------------------
# Montés par le driver `local` (mount NFS côté noyau hôte). On monte la RACINE
# du partage exporté (NFS Synology n'exporte que la racine du dossier partagé,
# pas les sous-dossiers) ; le `subpath` côté service ne révèle que l'arbo utile.
# Renseigner NAS_IP dans l'UI Portainer ; exports/subpaths ont des défauts
# surchargeables (NAS_LIBRARY_EXPORT / NAS_INCOMING_EXPORT / *_SUBPATH).
#   - nas          : partage `Data`     (/volume1/Data)     → subpath Media/Photos/Photography (RO)
#   - nas_incoming : partage `Computing`(/volume4/Computing)→ subpath captures (RW)
# Pré-requis Synology : Panneau de configuration → Dossier partagé → Data ET
# Computing → Permissions NFS → règle pour l'IP de l'Optiplex, Sécurité = sys
# (AUTH_SYS), Squash = « Pas de mapping » (ou map vers un utilisateur pouvant
# écrire dans captures). `subpath` exige Docker Engine ≥ 26 (sinon, voir la note
# de repli en bas). Note Kerberos : voir bas de fichier.
volumes:
  nas:
    driver: local
    driver_opts:
      type: nfs
      # ro + soft : un hoquet NAS ne fige pas le scanner (résilience par-fichier).
      o: "addr=${NAS_IP},nfsvers=4.1,ro,soft,timeo=30,retrans=2"
      device: ":${NAS_LIBRARY_EXPORT:-/volume1/Data}"
  nas_incoming:
    driver: local
    driver_opts:
      type: nfs
      # rw + hard : on ne veut JAMAIS perdre silencieusement une écriture d'import.
      o: "addr=${NAS_IP},nfsvers=4.1,rw,hard,timeo=600,retrans=2"
      device: ":${NAS_INCOMING_EXPORT:-/volume4/Computing}"

networks:
  # Réseau privé interne aux services Winnow.
  winnow:
  # Réseau partagé avec Traefik (créé hors stack : `docker network create edge`).
  edge:
    external: true

# --- Image GHCR + Watchtower ----------------------------------------------
# app/worker/migrate tournent sur ghcr.io/costardrouge/winnow:main, publiée à
# chaque push sur `main` (.github/workflows/docker-build.yml). Watchtower, via le
# label com.centurylinklabs.watchtower.enable=true, re-pull l'image quand le tag
# `main` bouge et redéploie. Pour figer une version (rollback), épingle un tag
# immuable `sha-xxxxxxx` au lieu de `main`.
# Build local : pour tester sans GHCR, remplace `image:` par `build: .` dans les
# trois services (et déploie alors depuis une copie locale du dépôt).
#
# --- Repli si Docker Engine < 26 (pas de `subpath`) ------------------------
# Si le déploiement refuse l'option `subpath`, monte la racine du partage et
# pointe l'app sur la sous-arbo via l'env (ajouter dans x-winnow-env / Portainer
# INCOMING_DIR=/nas-incoming/captures), puis dans app+worker remplace les blocs
# `type: volume … subpath:` par les formes courtes :
#     - nas:/nas:ro                 # /nas = tout le partage Data (RO) → scanner /nas/Media/Photos/Photography
#     - nas_incoming:/nas-incoming  # INCOMING_DIR doit viser .../captures
#
# --- NFS Kerberos (optionnel, déconseillé en LAN de confiance) -------------
# Le NAS expose aussi du NFS Kerberos. Sur un réseau privé, AUTH_SYS + règle IP
# suffit et reste BIEN plus simple : le montage NFS se fait dans le noyau de
# l'hôte (driver `local`), donc Kerberos exigerait côté HÔTE rpc.gssd actif, un
# /etc/krb5.conf pointant le KDC, et un keytab machine joint au domaine — lourd
# pour zéro gain ici. Si tu y tiens, ajoute `sec=krb5` (ou krb5i/krb5p) dans le
# `o:` des volumes et provisionne gssd+keytab sur l'Optiplex.