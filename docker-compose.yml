# Winnow — Optiplex deployment.
#   NAS = source (existing sessions read-only) + "incoming" zone (RW).
#   All state (Postgres, Redis, derivatives, exports, inbox) lives on the Optiplex.
#
# First start:
#   cp .env.dist .env   &&   edit NAS_MOUNT / NAS_INCOMING
#   docker compose up -d --build
# (the `migrate` service applies the schema before app/worker start)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: winnow
      POSTGRES_PASSWORD: winnow
      POSTGRES_DB: winnow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U winnow -d winnow"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Postgres backups. The DB is the source of truth for all curation work
  # (verdicts, stars, tags, the source→export lineage) — the RAWs are RO and
  # never lost, but this state lives ONLY here. This sidecar takes a compressed
  # pg_dump on a schedule and prunes old dumps. Same image as the server so the
  # pg_dump version matches. Restore procedure + off-box copy: docs/BACKUP.md.
  # Dumps land in ./backups (gitignored); BACKUP_* are read from .env if present.
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: winnow
      PGPASSWORD: winnow
      PGDATABASE: winnow
      BACKUP_INTERVAL: "${BACKUP_INTERVAL:-86400}"  # seconds between dumps (86400 = daily)
      BACKUP_KEEP_DAYS: "${BACKUP_KEEP_DAYS:-14}"   # retention: delete dumps older than N days
    volumes:
      - ./backups:/backups
    # `$$` escapes Compose interpolation so these reach the shell, not Compose.
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /backups
        echo "[backup] every $${BACKUP_INTERVAL}s, keep $${BACKUP_KEEP_DAYS}d, dir /backups"
        trap 'echo "[backup] stopping"; exit 0' TERM INT
        while true; do
          ts=$$(date -u +%Y%m%d-%H%M%S)
          work="/backups/.winnow-$$ts.sql"
          final="/backups/winnow-$$ts.sql.gz"
          echo "[backup] $$(date -u +%Y-%m-%dT%H:%M:%SZ) dumping $${PGDATABASE}@$${PGHOST}"
          if pg_dump --format=plain --no-owner --no-privileges > "$$work" && [ -s "$$work" ]; then
            gzip -6 "$$work"
            mv "$$work.gz" "$$final"
            echo "[backup] wrote $$(du -h "$$final" | cut -f1) -> $$final"
            find /backups -maxdepth 1 -name 'winnow-*.sql.gz' -type f -mtime +$${BACKUP_KEEP_DAYS} -exec rm -f {} \;
          else
            echo "[backup] FAILED — keeping existing dumps, will retry next cycle" >&2
            rm -f "$$work"
          fi
          sleep "$${BACKUP_INTERVAL}"
        done
    healthcheck:
      # Unhealthy if no dump in the last 2 days (assumes ~daily BACKUP_INTERVAL).
      test: ["CMD-SHELL", "find /backups -maxdepth 1 -name 'winnow-*.sql.gz' -mtime -2 | grep -q ."]
      interval: 1h
      timeout: 10s
      retries: 3
      start_period: 3m

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional MinIO: uncomment and set STORAGE_DRIVER=s3 in .env to switch.
  # minio:
  #   image: minio/minio
  #   restart: unless-stopped
  #   command: server /data --console-address ":9001"
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   volumes:
  #     - miniodata:/data
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"

  # One-shot: applies the migrations then exits. app/worker wait for it.
  migrate:
    build: .
    command: ["npm", "run", "migrate"]
    env_file: .env
    init: true
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    command: ["npm", "run", "start"]
    env_file: .env
    init: true
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Already-filed sessions: read-only. Incoming (imports): read/write.
      - ${NAS_MOUNT:-./nas}:/nas:ro
      - ${NAS_INCOMING:-./nas-incoming}:/nas-incoming
      # "Final" folder of the NAS (Immich output): indexed for browsing, RO.
      - ${NAS_FINAL:-./nas-final}:/nas-final:ro
      - inbox:/data/inbox
      - derivatives:/data/derivatives
      - exports:/data/exports

  worker:
    build: .
    command: ["npm", "run", "worker"]
    env_file: .env
    init: true
    restart: unless-stopped
    # The worker's own footprint is small (~130 MB anonymous), but decoding media
    # off the NAS to build derivatives fills the kernel page cache, which the
    # cgroup attributes to the container — so `docker stats` shows multiple GB of
    # reclaimable cache, not a leak. Capping the cgroup keeps that cache bounded
    # (the kernel evicts it under the limit) without starving the actual work.
    mem_limit: 4g
    # Hardware video encoding (VAAPI): uncomment to share the iGPU, then
    # set VIDEO_HWACCEL=vaapi in .env. Otherwise ffmpeg encodes in software.
    # devices:
    #   - /dev/dri:/dev/dri
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${NAS_MOUNT:-./nas}:/nas:ro
      - ${NAS_INCOMING:-./nas-incoming}:/nas-incoming
      - ${NAS_FINAL:-./nas-final}:/nas-final:ro
      - inbox:/data/inbox
      - derivatives:/data/derivatives
      - exports:/data/exports
    # Override the image's HTTP probe (made for the web app): the worker serves
    # no HTTP, so the inherited /api/health fetch always fails and shows the
    # container "unhealthy" while it's actually fine. This probe instead checks
    # the worker can reach Redis + Postgres — the backends it needs to do work.
    healthcheck:
      test: ["CMD", "npx", "tsx", "src/scripts/healthcheck-worker.ts"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3

  # --- Optional ingest feeders (write into the inbox) -----------------------
  # SMB share: drop cards/files from any machine on the LAN.
  # samba:
  #   image: dperson/samba
  #   restart: unless-stopped
  #   command: -s "winnow-inbox;/inbox;yes;no;no;all" -u "shooter;changeme"
  #   ports: ["445:445"]
  #   volumes:
  #     - inbox:/inbox
  #
  # FTP: target for the Sony A7C II's FTP transfer (writes into the inbox).
  # ftp:
  #   image: garethflowers/ftp-server
  #   restart: unless-stopped
  #   environment:
  #     FTP_USER: shooter
  #     FTP_PASS: changeme
  #   ports: ["21:21", "40000-40009:40000-40009"]
  #   volumes:
  #     - inbox:/home/shooter

volumes:
  pgdata:
  redisdata:
  inbox:
  derivatives:
  exports:
  # miniodata:
