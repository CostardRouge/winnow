# Winnow — Optiplex deployment.
#   NAS = source (existing sessions read-only) + "incoming" zone (RW).
#   All state (Postgres, Redis, derivatives, exports, inbox) lives on the Optiplex.
#
# First start:
#   cp .env.dist .env   &&   edit NAS_MOUNT / NAS_INCOMING
#   docker compose up -d --build
# (the `migrate` service applies the schema before app/worker start)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: winnow
      POSTGRES_PASSWORD: winnow
      POSTGRES_DB: winnow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U winnow -d winnow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional MinIO: uncomment and set STORAGE_DRIVER=s3 in .env to switch.
  # minio:
  #   image: minio/minio
  #   restart: unless-stopped
  #   command: server /data --console-address ":9001"
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   volumes:
  #     - miniodata:/data
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"

  # One-shot: applies the migrations then exits. app/worker wait for it.
  migrate:
    build: .
    command: ["npm", "run", "migrate"]
    env_file: .env
    init: true
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    command: ["npm", "run", "start"]
    env_file: .env
    init: true
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Already-filed sessions: read-only. Incoming (imports): read/write.
      - ${NAS_MOUNT:-./nas}:/nas:ro
      - ${NAS_INCOMING:-./nas-incoming}:/nas-incoming
      # "Final" folder of the NAS (Immich output): indexed for browsing, RO.
      - ${NAS_FINAL:-./nas-final}:/nas-final:ro
      - inbox:/data/inbox
      - derivatives:/data/derivatives
      - exports:/data/exports

  worker:
    build: .
    command: ["npm", "run", "worker"]
    env_file: .env
    init: true
    restart: unless-stopped
    # Prometheus metrics (scan throughput, queue depth, failure rate) are served
    # on METRICS_PORT (9091) at /metrics. A Prometheus on the same Docker network
    # scrapes worker:9091 directly; uncomment to also publish it on the host.
    # ports:
    #   - "9091:9091"
    # Hardware video encoding (VAAPI): uncomment to share the iGPU, then
    # set VIDEO_HWACCEL=vaapi in .env. Otherwise ffmpeg encodes in software.
    # devices:
    #   - /dev/dri:/dev/dri
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${NAS_MOUNT:-./nas}:/nas:ro
      - ${NAS_INCOMING:-./nas-incoming}:/nas-incoming
      - ${NAS_FINAL:-./nas-final}:/nas-final:ro
      - inbox:/data/inbox
      - derivatives:/data/derivatives
      - exports:/data/exports

  # --- Optional ingest feeders (write into the inbox) -----------------------
  # SMB share: drop cards/files from any machine on the LAN.
  # samba:
  #   image: dperson/samba
  #   restart: unless-stopped
  #   command: -s "winnow-inbox;/inbox;yes;no;no;all" -u "shooter;changeme"
  #   ports: ["445:445"]
  #   volumes:
  #     - inbox:/inbox
  #
  # FTP: target for the Sony A7C II's FTP transfer (writes into the inbox).
  # ftp:
  #   image: garethflowers/ftp-server
  #   restart: unless-stopped
  #   environment:
  #     FTP_USER: shooter
  #     FTP_PASS: changeme
  #   ports: ["21:21", "40000-40009:40000-40009"]
  #   volumes:
  #     - inbox:/home/shooter

volumes:
  pgdata:
  redisdata:
  inbox:
  derivatives:
  exports:
  # miniodata:
